<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kapışalım - Hızlı API Üretici</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f1a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .card { background: #161b2c; border: 1px solid #2d3748; }
        .btn-primary { background: #eab308; color: #000; font-weight: 800; transition: all 0.2s; }
        .btn-primary:hover { background: #facc15; transform: translateY(-1px); }
        .btn-secondary { background: #2563eb; color: #fff; font-weight: 800; transition: all 0.2s; }
        .btn-secondary:hover { background: #3b82f6; transform: translateY(-1px); }
        .loader { border: 2px solid #f3f3f3; border-top: 2px solid #eab308; border-radius: 50%; width: 14px; height: 14px; animation: spin 1s linear infinite; display: inline-block; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        textarea::placeholder { color: #4a5568; }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center justify-center">

    <div class="w-full max-w-6xl space-y-6">
        <header class="text-center space-y-2">
            <h1 class="text-3xl md:text-5xl font-black text-yellow-500 italic uppercase tracking-tighter">⚡ HIZLI SORU FABRİKASI</h1>
            <p class="text-slate-400 text-sm font-medium">Saniyeler içinde OpenTDB formatında API oluşturun.</p>
        </header>

        <div class="grid lg:grid-cols-2 gap-6">
            <!-- Giriş Alanı -->
            <div class="card p-6 rounded-3xl shadow-2xl space-y-5">
                <div>
                    <label class="block text-[10px] font-bold text-yellow-500 mb-2 uppercase tracking-widest px-1">1. Soru Metni (Kopyala/Yapıştır)</label>
                    <textarea id="inputText" class="w-full h-80 bg-slate-900 border border-slate-800 rounded-2xl p-4 text-xs outline-none focus:border-yellow-500 transition-all font-mono leading-relaxed" placeholder="1. Soru...&#10;A) Şık 1&#10;B) Şık 2..."></textarea>
                </div>
                
                <div>
                    <label class="block text-[10px] font-bold text-yellow-500 mb-2 uppercase tracking-widest px-1">2. Cevap Anahtarı</label>
                    <input id="answerKey" type="text" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-xs outline-none focus:border-yellow-500" placeholder="Örn: 1-C, 2-D, 3-A">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <button onclick="processData()" class="btn-primary py-3 rounded-xl shadow-lg">AYRIŞTIR ✨</button>
                    <button id="apiBtn" onclick="getApiLink()" class="btn-secondary py-3 rounded-xl shadow-lg disabled:opacity-30" disabled>API LİNKİ AL 🌐</button>
                </div>
            </div>

            <!-- Çıkış Alanı -->
            <div class="card p-6 rounded-3xl shadow-2xl flex flex-col space-y-4">
                <div id="linkPanel" class="hidden p-4 bg-blue-500/10 border border-blue-500/30 rounded-2xl animate-pulse">
                    <label class="block text-[10px] font-bold text-blue-400 mb-2 uppercase">Canlı API Linkin (Kopyala ve Admin Paneline Yapıştır):</label>
                    <div class="flex gap-2">
                        <input id="resultLink" readonly class="flex-grow bg-black/40 border border-blue-500/20 text-blue-200 text-[10px] p-2 rounded-lg outline-none">
                        <button onclick="copyToClipboard('resultLink')" class="bg-blue-600 text-white px-4 rounded-lg text-[10px] font-bold">KOPYALA</button>
                    </div>
                </div>

                <div class="flex justify-between items-center px-1">
                    <h3 class="text-xs font-bold text-green-500 uppercase tracking-widest">Önizleme (OpenTDB)</h3>
                    <div class="flex gap-2">
                        <button onclick="downloadJson()" class="text-[10px] text-slate-400 hover:text-white underline">JSON İndir</button>
                    </div>
                </div>

                <div class="flex-grow bg-black/40 p-4 rounded-2xl font-mono text-[10px] text-green-500 overflow-auto max-h-[450px] border border-slate-800">
                    <pre id="jsonPreview">Veri bekleniyor...</pre>
                </div>
                
                <div id="statusMsg" class="text-[10px] text-center font-bold h-4"></div>
            </div>
        </div>
    </div>

    <script>
        let finalData = null;

        function processData() {
            const text = document.getElementById('inputText').value;
            const ansRaw = document.getElementById('answerKey').value;
            const preview = document.getElementById('jsonPreview');
            const status = document.getElementById('statusMsg');
            
            if(!text.trim()) return;

            const answers = {};
            if(ansRaw) {
                const pairs = ansRaw.split(/[,-\s]+/);
                for(let i=0; i<pairs.length; i+=2) {
                    if(pairs[i] && pairs[i+1]) answers[pairs[i].replace('.','')] = pairs[i+1].toUpperCase();
                }
            }

            const blocks = text.split(/\n(?=\d+[\.)\s])/);
            const results = blocks.map((block, idx) => {
                const parts = block.split(/\n([A-E][\)\.])\s+/);
                const qText = parts[0].replace(/^\d+[\.)\s]+/, '').trim();
                const opts = [];
                for(let j=1; j<parts.length; j+=2) {
                    opts.push({ key: parts[j][0], text: parts[j+1]?.trim() || "" });
                }

                const id = block.match(/^(\d+)/)?.[1] || (idx + 1);
                const correctKey = answers[id] || "A";
                const correctObj = opts.find(o => o.key === correctKey) || opts[0];
                const incorrects = opts.filter(o => o.key !== correctKey).map(o => o.text);

                return {
                    category: "Genel",
                    type: "multiple",
                    difficulty: "medium",
                    question: qText,
                    correct_answer: correctObj ? correctObj.text : "",
                    incorrect_answers: incorrects.length > 0 ? incorrects : ["Yanlış Seçenek 1", "Yanlış Seçenek 2", "Yanlış Seçenek 3"]
                };
            }).filter(q => q.question);

            finalData = { response_code: 0, results: results };
            preview.textContent = JSON.stringify(finalData, null, 2);
            document.getElementById('apiBtn').disabled = false;
            status.innerText = `✅ ${results.length} soru ayrıştırıldı.`;
            status.className = "text-[10px] text-center font-bold text-green-500 h-4";
        }

        async function getApiLink() {
            if(!finalData) return;
            const btn = document.getElementById('apiBtn');
            const linkPanel = document.getElementById('linkPanel');
            const resultInput = document.getElementById('resultLink');
            
            btn.innerHTML = `<span class="loader"></span>...`;
            btn.disabled = true;

            try {
                // Daha hızlı bir servis olan jsonblob.com kullanıyoruz
                const response = await fetch('https://jsonblob.com/api/jsonBlob', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify(finalData)
                });

                if(response.ok) {
                    const location = response.headers.get('Location');
                    // Location header'ı linki verir (http -> https çeviriyoruz)
                    const secureLink = location.replace('http://', 'https://');
                    linkPanel.classList.remove('hidden');
                    resultInput.value = secureLink;
                    btn.innerHTML = `HAZIR ✅`;
                } else {
                    throw new Error("Sunucu hatası");
                }
            } catch (e) {
                console.error(e);
                alert("Link oluşturulamadı. Lütfen 'JSON İndir' butonunu kullanın.");
                btn.innerHTML = `HATA ❌`;
                btn.disabled = false;
            }
        }

        function copyToClipboard(id) {
            const input = document.getElementById(id);
            input.select();
            document.execCommand('copy');
            alert("Link kopyalandı!");
        }

        function downloadJson() {
            if(!finalData) return;
            const blob = new Blob([JSON.stringify(finalData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `sorular_${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
