<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kapışalım Cloud - API Paneli</title>
    <!-- Tailwind CSS ve Fontlar -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React ve Babel (Tarayıcıda JSX çalıştırmak için) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- DİKKAT: Firebase Ayarlarını Buraya Ekle ---
        // Kendi Firebase projenin ayarlarını "firebaseConfig" içine yapıştır.
        const firebaseConfig = {
            apiKey: "API_KEY_BURAYA",
            authDomain: "PROJE_ID.firebaseapp.com",
            projectId: "PROJE_ID",
            storageBucket: "PROJE_ID.appspot.com",
            messagingSenderId: "SENDER_ID",
            appId: "APP_ID"
        };
        // ----------------------------------------------

        const App = () => {
            const [inputText, setInputText] = useState('');
            const [answerKey, setAnswerKey] = useState('');
            const [questions, setQuestions] = useState(null);
            const [generatedUrl, setGeneratedUrl] = useState('');
            const [status, setStatus] = useState({ message: '', type: '' });

            const handleParse = () => {
                if (!inputText.trim()) {
                    setStatus({ message: 'Lütfen soru metni girin!', type: 'error' });
                    return;
                }

                const answers = {};
                if (answerKey) {
                    const pairs = answerKey.split(/[,-\s]+/);
                    for (let i = 0; i < pairs.length; i += 2) {
                        if (pairs[i] && pairs[i + 1]) {
                            answers[pairs[i].replace('.', '')] = pairs[i + 1].toUpperCase();
                        }
                    }
                }

                const blocks = inputText.split(/\n(?=\d+[\.)\s])/);
                const parsed = blocks.map((block, i) => {
                    const parts = block.split(/\n([A-E][\)\.])\s+/);
                    const question_text = parts[0].replace(/^\d+[\.)\s]+/, '').trim();
                    
                    const options = {};
                    for (let j = 1; j < parts.length; j += 2) {
                        const key = parts[j][0];
                        options[key] = parts[j + 1] ? parts[j + 1].trim() : "";
                    }

                    const idMatch = block.match(/^(\d+)/);
                    const id = idMatch ? idMatch[1] : (i + 1);

                    return {
                        id: parseInt(id),
                        question: question_text,
                        options: options,
                        answer: answers[id] || "A"
                    };
                }).filter(q => q.question);

                setQuestions(parsed);
                setStatus({ message: `✅ ${parsed.length} soru ayrıştırıldı.`, type: 'success' });
            };

            const copyToClipboard = (text) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                alert("Kopyalandı!");
            };

            return (
                <div className="min-h-screen p-4 md:p-8 font-sans">
                    <div className="max-w-5xl mx-auto space-y-8">
                        <div className="text-center space-y-2">
                            <h1 className="text-4xl font-extrabold text-yellow-500 tracking-tight">KAPIŞALIM CLOUD</h1>
                            <p className="text-slate-400 text-sm">Ücretsiz Soru Bankası API Fabrikası</p>
                        </div>

                        <div className="grid lg:grid-cols-2 gap-8">
                            <div className="bg-slate-900 border border-slate-800 p-6 rounded-2xl space-y-6">
                                <div>
                                    <label className="block text-xs font-bold text-yellow-500 uppercase mb-2">1. Metni Yapıştır</label>
                                    <textarea 
                                        value={inputText}
                                        onChange={(e) => setInputText(e.target.value)}
                                        className="w-full h-64 bg-slate-950 border border-slate-800 rounded-xl p-4 text-sm outline-none"
                                        placeholder="1. Soru...&#10;A) Şık..."
                                    />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-yellow-500 uppercase mb-2">2. Cevaplar</label>
                                    <input 
                                        type="text"
                                        value={answerKey}
                                        onChange={(e) => setAnswerKey(e.target.value)}
                                        className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm outline-none"
                                        placeholder="1-C, 2-D"
                                    />
                                </div>
                                <button 
                                    onClick={handleParse}
                                    className="w-full bg-yellow-500 hover:bg-yellow-400 text-slate-950 font-bold py-3 rounded-xl transition-all"
                                >
                                    METNİ ÇÖZ 🔍
                                </button>
                            </div>

                            <div className="bg-slate-900 border border-slate-800 p-6 rounded-2xl flex flex-col min-h-[500px]">
                                <h3 className="text-sm font-bold text-green-500 uppercase mb-4">JSON Önizleme</h3>
                                <div className="flex-grow bg-black/40 border border-slate-800 rounded-xl p-4 overflow-auto font-mono text-[11px] text-green-400">
                                    {questions ? <pre>{JSON.stringify(questions, null, 2)}</pre> : "İşlem bekleniyor..."}
                                </div>
                                {questions && (
                                    <button 
                                        onClick={() => copyToClipboard(JSON.stringify(questions))}
                                        className="mt-4 bg-blue-600 text-white py-2 rounded-lg text-xs font-bold"
                                    >
                                        VERİYİ KOPYALA
                                    </button>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
