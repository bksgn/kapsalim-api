<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kapisalım | Soru Yükleme Motoru</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Hareketli Arka Plan Animasyonu */
        body {
            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1a2a6c);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism (Cam Efekti) Paneller */
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Özel Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 4px; }
    </style>
</head>
<body class="flex flex-col items-center justify-start pt-10">

    <div class="glass-panel w-full max-w-4xl p-8 mb-8">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">
                    Kapisalım Soru Motoru 🐉
                </h1>
                <p class="text-gray-300 mt-2 text-sm">JSON formatındaki soru havuzunu yükle ve otomatik deneme oluştur.</p>
            </div>
        </div>

        <div class="flex flex-col md:flex-row gap-4 items-center bg-black/20 p-6 rounded-xl border border-white/10">
            <input type="file" id="jsonInput" accept=".json" class="block w-full text-sm text-gray-300
                file:mr-4 file:py-2 file:px-4
                file:rounded-full file:border-0
                file:text-sm file:font-semibold
                file:bg-blue-600 file:text-white
                hover:file:bg-blue-700 cursor-pointer transition-all" 
                onchange="dosyaYukle(event)"
            />
            <button id="btnTestUret" onclick="rastgeleTestOlustur()" class="hidden w-full md:w-auto bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 px-6 py-2 rounded-full font-bold shadow-lg transition-all transform hover:scale-105 whitespace-nowrap">
                🎲 10 Soru Çek (Test Üret)
            </button>
        </div>
        
        <div id="durumMesaj" class="mt-4 text-center font-medium text-yellow-300 h-6">
            Lütfen bir .json dosyası seçin...
        </div>
    </div>

    <div id="testAlani" class="w-full max-w-4xl space-y-6 hidden">
        <h2 class="text-2xl font-bold text-center mb-6">📝 Üretilen Rastgele Deneme</h2>
        <div id="soruListesi" class="space-y-4">
            </div>
    </div>

    <script>
        let soruHavuzu = [];

        // 1. JSON Dosyasını Okuma Fonksiyonu
        function dosyaYukle(event) {
            const dosya = event.target.files[0];
            if (!dosya) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    // Dosyayı parse et
                    const veri = JSON.parse(e.target.result);
                    
                    // Verinin bir dizi olup olmadığını kontrol et
                    if(Array.isArray(veri)) {
                        soruHavuzu = veri;
                        document.getElementById('durumMesaj').innerHTML = `<span class="text-emerald-400">✅ Başarılı! Havuza toplam <b>${soruHavuzu.length}</b> soru yüklendi.</span>`;
                        document.getElementById('btnTestUret').classList.remove('hidden');
                    } else {
                        throw new Error("JSON bir dizi (Array) formatında olmalı.");
                    }
                } catch (hata) {
                    document.getElementById('durumMesaj').innerHTML = `<span class="text-red-400">❌ Hata: Geçersiz veya bozuk JSON dosyası. (${hata.message})</span>`;
                    document.getElementById('btnTestUret').classList.add('hidden');
                }
            };
            reader.readAsText(dosya);
        }

        // 2. Rastgele Test Üretme Fonksiyonu
        function rastgeleTestOlustur() {
            if (soruHavuzu.length === 0) {
                alert("Önce soru yüklemelisin!");
                return;
            }

            // Diziyi karıştır (Fisher-Yates Shuffle benzeri basit yöntem)
            const karisikSorular = [...soruHavuzu].sort(() => 0.5 - Math.random());
            
            // İlk 10 tanesini al (Eğer 10'dan az soru varsa hepsini al)
            const secilenSorular = karisikSorular.slice(0, Math.min(10, soruHavuzu.length));

            ekranaBas(secilenSorular);
        }

        // 3. Soruları Ekrana Çizme Fonksiyonu
        function ekranaBas(sorular) {
            const listeDiv = document.getElementById('soruListesi');
            listeDiv.innerHTML = ''; // Önceki testi temizle
            
            document.getElementById('testAlani').classList.remove('hidden');

            sorular.forEach((soruObjesi, index) => {
                // Şıkları dizi olarak al (JSON yapısına göre burayı esnetebiliriz)
                // JSON formatının {"question": "...", "options": ["A","B","C","D"], "answer": "..."} olduğunu varsayıyoruz
                let siklarHTML = '';
                
                if(soruObjesi.options && Array.isArray(soruObjesi.options)) {
                    soruObjesi.options.forEach(sik => {
                        siklarHTML += `<div class="bg-white/5 p-3 rounded-lg mt-2 border border-white/5 hover:bg-white/10 transition-colors cursor-pointer text-gray-200">
                            ${sik}
                        </div>`;
                    });
                } else if(soruObjesi.secenekler) { // Türkçe format alternatifi
                    for (const [harf, metin] of Object.entries(soruObjesi.secenekler)) {
                         siklarHTML += `<div class="bg-white/5 p-3 rounded-lg mt-2 border border-white/5 hover:bg-white/10 transition-colors cursor-pointer text-gray-200">
                            <span class="font-bold text-blue-300 mr-2">${harf.toUpperCase()})</span> ${metin}
                        </div>`;
                    }
                }

                const soruHTML = `
                    <div class="glass-panel p-6">
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="text-lg font-bold text-blue-200">Soru ${index + 1}</h3>
                            <span class="text-xs bg-white/10 px-3 py-1 rounded-full text-gray-300">
                                ${soruObjesi.kategori || soruObjesi.category || 'Genel Kültür'}
                            </span>
                        </div>
                        <p class="text-lg mb-4 font-medium leading-relaxed">${soruObjesi.soru || soruObjesi.question}</p>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
                            ${siklarHTML}
                        </div>
                    </div>
                `;
                listeDiv.innerHTML += soruHTML;
            });
        }
    </script>
</body>
</html>
