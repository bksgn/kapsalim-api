<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kapışalım - OpenTDB Uyumlu API Üretici</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .loader { border: 2px solid #f3f3f3; border-top: 2px solid #eab308; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10 flex flex-col items-center">

    <div class="max-w-5xl w-full space-y-8">
        <div class="text-center">
            <h1 class="text-4xl font-black text-yellow-500 italic uppercase">🚀 Soru Fabrikası API Paneli</h1>
            <p class="text-slate-400 mt-2">OpenTDB Formatında Temiz API Linki Üretir</p>
        </div>

        <div class="grid lg:grid-cols-2 gap-8">
            <!-- Giriş -->
            <div class="glass p-6 rounded-[2rem] space-y-6">
                <div>
                    <label class="block text-[10px] font-bold text-yellow-500 mb-2 uppercase tracking-widest">1. Metni Yapıştır</label>
                    <textarea id="inputText" class="w-full h-72 bg-black/40 p-4 rounded-2xl text-sm outline-none border border-slate-800 focus:border-yellow-500 font-mono" placeholder="1. Soru...&#10;A) Şık..."></textarea>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-yellow-500 mb-2 uppercase tracking-widest">2. Cevaplar</label>
                    <input id="answerKey" type="text" class="w-full bg-black/40 p-3 rounded-xl text-sm outline-none border border-slate-800" placeholder="Örn: 1-C, 2-D">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="parseQuestions()" class="bg-yellow-500 text-black font-bold py-3 rounded-xl hover:bg-yellow-400 transition-all">ÇÖZ ✨</button>
                    <button id="apiBtn" onclick="createCleanApi()" class="bg-blue-600 text-white font-bold py-3 rounded-xl disabled:opacity-30 transition-all" disabled>TEMİZ API LİNKİ AL 🌐</button>
                </div>
            </div>

            <!-- Çıkış -->
            <div class="glass p-6 rounded-[2rem] flex flex-col">
                <div id="urlArea" class="hidden mb-6 p-4 bg-blue-500/10 border border-blue-500/30 rounded-2xl animate-pulse">
                    <label class="block text-[10px] font-bold text-blue-400 mb-1">SİTEN İÇİN KULLANILACAK API LİNKİ:</label>
                    <div class="flex gap-2">
                        <input id="apiLink" readonly class="flex-grow bg-black/50 p-2 rounded text-[10px] text-blue-200 outline-none">
                        <button onclick="copyUrl()" class="bg-blue-600 text-white px-3 rounded text-[10px] font-bold">KOPYALA</button>
                    </div>
                </div>

                <h3 class="text-xs font-bold text-green-500 mb-2 uppercase tracking-widest">OpenTDB Formatında Önizleme</h3>
                <pre id="outputJson" class="flex-grow bg-black/50 p-4 rounded-2xl text-[10px] text-green-400 font-mono overflow-auto max-h-[400px]">İşlem bekleniyor...</pre>
            </div>
        </div>
    </div>

    <script>
        let currentQuizData = null;

        function parseQuestions() {
            const text = document.getElementById('inputText').value;
            const answersRaw = document.getElementById('answerKey').value;
            const answers = {};
            
            if (answersRaw) {
                const pairs = answersRaw.split(/[,-\s]+/);
                for (let i = 0; i < pairs.length; i += 2) {
                    if (pairs[i] && pairs[i+1]) answers[pairs[i].replace('.', '')] = pairs[i+1].toUpperCase();
                }
            }

            const blocks = text.split(/\n(?=\d+[\.)\s])/);
            const results = blocks.map((block, index) => {
                const parts = block.split(/\n([A-E][\)\.])\s+/);
                const questionText = parts[0].replace(/^\d+[\.)\s]+/, '').trim();
                
                const options = [];
                for (let j = 1; j < parts.length; j += 2) {
                    options.push({ key: parts[j][0], text: parts[j+1]?.trim() || "" });
                }

                const id = block.match(/^(\d+)/)?.[1] || (index + 1);
                const correctLetter = answers[id] || "A";
                const correctAnswerObj = options.find(o => o.key === correctLetter);
                const incorrectAnswers = options.filter(o => o.key !== correctLetter).map(o => o.text);

                // OpenTDB Formatı (Sitenin anladığı yapı)
                return {
                    category: "Genel Kültür",
                    type: "multiple",
                    difficulty: "medium",
                    question: questionText,
                    correct_answer: correctAnswerObj ? correctAnswerObj.text : (options[0]?.text || ""),
                    incorrect_answers: incorrectAnswers.length > 0 ? incorrectAnswers : ["B seçeneği", "C seçeneği", "D seçeneği"]
                };
            }).filter(q => q.question);

            // OpenTDB'nin beklediği ana yapı: { "results": [...] }
            currentQuizData = { response_code: 0, results: results };
            document.getElementById('outputJson').textContent = JSON.stringify(currentQuizData, null, 2);
            document.getElementById('apiBtn').disabled = false;
        }

        async function createCleanApi() {
            if (!currentQuizData) return;
            const btn = document.getElementById('apiBtn');
            btn.innerHTML = `<span class="loader"></span> OLUŞTURULUYOR...`;
            btn.disabled = true;

            try {
                // JSONbin.io kullanarak saf JSON linki oluşturuyoruz (Üye olmadan geçici kullanım)
                const response = await fetch('https://api.jsonbin.io/v3/b', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Bin-Private': 'false'
                    },
                    body: JSON.stringify(currentQuizData)
                });

                const data = await response.json();
                if (data.metadata && data.metadata.id) {
                    // ?meta=false ekleyerek sadece saf JSON'u alıyoruz
                    const finalUrl = `https://api.jsonbin.io/v3/b/${data.metadata.id}?meta=false`;
                    document.getElementById('urlArea').classList.remove('hidden');
                    document.getElementById('apiLink').value = finalUrl;
                    btn.innerHTML = `API HAZIR ✅`;
                }
            } catch (error) {
                alert("Hata oluştu! Lütfen tekrar deneyin.");
                btn.innerHTML = `TEKRAR DENE`;
                btn.disabled = false;
            }
        }

        function copyUrl() {
            const input = document.getElementById('apiLink');
            input.select();
            document.execCommand('copy');
            alert("URL Kopyalandı! Şimdi Kapışalım Admin Paneli 'Soru Fabrikası'na yapıştırabilirsin.");
        }
    </script>
</body>
</html>
