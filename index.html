<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kapışalım Cloud | Soru Fabrikası</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            background-color: #060913; 
            color: #f8fafc; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-glow:focus {
            border-color: #eab308;
            box-shadow: 0 0 0 2px rgba(234, 179, 8, 0.1);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 5px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 10px;
        }

        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #eab308;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .bg-gradient {
            background: radial-gradient(circle at 50% 0%, rgba(234, 179, 8, 0.05) 0%, rgba(6, 9, 19, 0) 50%);
        }

        /* Wix ve Mobil için özel buton/input düzeltmeleri */
        input, textarea, button {
            max-width: 100%;
        }
    </style>
</head>
<body class="min-h-screen bg-gradient">

    <div class="max-w-[1400px] mx-auto px-4 sm:px-6 py-8 md:py-12">
        
        <!-- Header -->
        <header class="flex flex-col items-center mb-10 md:mb-16 space-y-4">
            <div class="bg-yellow-500/10 px-4 py-1 rounded-full border border-yellow-500/20">
                <span class="text-yellow-500 text-[10px] font-bold uppercase tracking-[0.3em]">Kapışalım Cloud Altyapısı</span>
            </div>
            <h1 class="text-4xl md:text-6xl font-extrabold tracking-tighter italic text-center text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-yellow-600">
                SORU FABRİKASI
            </h1>
            <p class="text-slate-400 text-xs md:text-sm max-w-md text-center leading-relaxed">
                Ham metinleri saniyeler içinde OpenTDB standartlarına dönüştürün ve canlı API linki oluşturun.
            </p>
        </header>

        <!-- Main Panel -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 md:gap-8">
            
            <!-- Left Side: Input -->
            <div class="glass-card p-6 md:p-8 rounded-[2rem] space-y-6">
                <div class="flex items-center justify-between mb-2">
                    <h2 class="text-sm font-bold text-yellow-500 flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></span>
                        SORU METNİ GİRİŞİ
                    </h2>
                    <div class="flex gap-4">
                        <button onclick="document.getElementById('jsonFileInput').click()" class="text-[10px] text-blue-400 hover:text-blue-300 transition-colors font-bold uppercase">JSON Yükle</button>
                        <input type="file" id="jsonFileInput" class="hidden" accept=".json" onchange="handleFileSelect(event)">
                        <button onclick="clearAll()" class="text-[10px] text-slate-500 hover:text-white transition-colors uppercase">Temizle</button>
                    </div>
                </div>

                <textarea id="inputText" 
                    class="w-full h-[300px] md:h-[450px] bg-slate-950/50 border border-slate-800 rounded-2xl p-4 md:p-6 text-sm text-slate-300 outline-none input-glow transition
