<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kapışalım Cloud | Soru Fabrikası</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            background-color: #060913; 
            color: #f8fafc; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-glow:focus {
            border-color: #eab308;
            box-shadow: 0 0 0 2px rgba(234, 179, 8, 0.1);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 5px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 10px;
        }

        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #eab308;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .bg-gradient {
            background: radial-gradient(circle at 50% 0%, rgba(234, 179, 8, 0.05) 0%, rgba(6, 9, 19, 0) 50%);
        }

        /* Wix ve Mobil için özel buton/input düzeltmeleri */
        input, textarea, button {
            max-width: 100%;
        }
    </style>
</head>
<body class="min-h-screen bg-gradient">

    <div class="max-w-[1400px] mx-auto px-4 sm:px-6 py-8 md:py-12">
        
        <!-- Header -->
        <header class="flex flex-col items-center mb-10 md:mb-16 space-y-4">
            <div class="bg-yellow-500/10 px-4 py-1 rounded-full border border-yellow-500/20">
                <span class="text-yellow-500 text-[10px] font-bold uppercase tracking-[0.3em]">Kapışalım Cloud Altyapısı</span>
            </div>
            <h1 class="text-4xl md:text-6xl font-extrabold tracking-tighter italic text-center text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-yellow-600">
                SORU FABRİKASI
            </h1>
            <p class="text-slate-400 text-xs md:text-sm max-w-md text-center leading-relaxed">
                Ham metinleri saniyeler içinde OpenTDB standartlarına dönüştürün ve canlı API linki oluşturun.
            </p>
        </header>

        <!-- Main Panel -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 md:gap-8">
            
            <!-- Left Side: Input -->
            <div class="glass-card p-6 md:p-8 rounded-[2rem] space-y-6">
                <div class="flex items-center justify-between mb-2">
                    <h2 class="text-sm font-bold text-yellow-500 flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></span>
                        SORU METNİ GİRİŞİ
                    </h2>
                    <button onclick="clearAll()" class="text-[10px] text-slate-500 hover:text-white transition-colors">TEMİZLE</button>
                </div>

                <textarea id="inputText" 
                    class="w-full h-[300px] md:h-[450px] bg-slate-950/50 border border-slate-800 rounded-2xl p-4 md:p-6 text-sm text-slate-300 outline-none input-glow transition-all font-mono custom-scrollbar resize-none" 
                    placeholder="1. Soru metni...&#10;A) Seçenek 1&#10;B) Seçenek 2..."></textarea>
                
                <div class="space-y-3">
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest px-1">Cevap Anahtarı (Opsiyonel)</label>
                    <input id="answerKey" type="text" 
                        class="w-full bg-slate-950/50 border border-slate-800 rounded-xl p-3 md:p-4 text-sm text-slate-300 outline-none input-glow transition-all" 
                        placeholder="Örn: 1-C, 2-D, 3-A">
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 pt-2 md:pt-4">
                    <button onclick="processQuestions()" class="bg-yellow-500 hover:bg-yellow-400 text-slate-950 font-black py-4 rounded-2xl transition-all shadow-xl shadow-yellow-500/10 flex items-center justify-center gap-2 group text-sm">
                        AYRIŞTIR 
                        <svg class="w-4 h-4 group-hover:rotate-12 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                    </button>
                    <button id="apiBtn" onclick="generateLink()" disabled class="bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl transition-all disabled:opacity-20 flex items-center justify-center gap-2 shadow-xl shadow-blue-600/10 text-sm">
                        API LİNKİ OLUŞTUR 🌐
                    </button>
                </div>
            </div>

            <!-- Right Side: Output -->
            <div class="glass-card p-6 md:p-8 rounded-[2rem] flex flex-col min-h-[500px]">
                
                <!-- Status & API Result -->
                <div id="resultPanel" class="hidden mb-8 space-y-4">
                    <div class="bg-blue-500/10 border border-blue-500/20 p-4 md:p-5 rounded-2xl space-y-3 animate-in fade-in zoom-in">
                        <div class="flex items-center justify-between">
                            <span class="text-[10px] font-bold text-blue-400 tracking-widest">CANLI API ENDPOINT</span>
                            <span class="bg-blue-500 text-white text-[8px] px-2 py-0.5 rounded font-black">AKTİF</span>
                        </div>
                        <div class="flex flex-col sm:flex-row gap-2">
                            <input id="finalUrl" readonly class="flex-grow bg-black/40 border border-blue-500/10 p-3 rounded-xl text-[10px] md:text-[11px] text-blue-300 font-mono outline-none truncate">
                            <button onclick="copyContent('finalUrl')" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 sm:py-0 rounded-xl text-xs font-bold transition-all shrink-0">KOPYALA</button>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-4 gap-4">
                    <h2 id="statusLabel" class="text-sm font-bold text-slate-500">ÖNİZLEME BEKLENİYOR</h2>
                    <div class="flex gap-4">
                        <button onclick="downloadJSON()" class="text-[10px] text-slate-500 hover:text-white transition-colors underline decoration-slate-800">İNDİR</button>
                        <button onclick="copyContent('jsonOutput', true)" class="text-[10px] text-slate-500 hover:text-white transition-colors underline decoration-slate-800">JSON KOPYALA</button>
                    </div>
                </div>

                <div class="flex-grow bg-slate-950/50 border border-slate-900 rounded-3xl p-4 md:p-6 overflow-auto custom-scrollbar font-mono text-[10px] md:text-[11px] leading-relaxed text-green-500/80">
                    <pre id="jsonOutput" class="whitespace-pre-wrap italic opacity-50">Henüz bir veri işlenmedi...</pre>
                </div>
                
                <div id="miniStatus" class="mt-4 text-center text-[10px] font-bold text-slate-600 uppercase tracking-widest h-4"></div>
            </div>
        </div>
        
        <footer class="mt-12 md:mt-16 text-center text-slate-700 text-[10px] font-bold uppercase tracking-[0.5em]">
            KAPIŞALIM PLATFORM YÖNETİM SİSTEMİ
        </footer>
    </div>

    <script>
        let quizData = null;

        function clearAll() {
            document.getElementById('inputText').value = '';
            document.getElementById('answerKey').value = '';
            document.getElementById('jsonOutput').textContent = 'Henüz bir veri işlenmedi...';
            document.getElementById('jsonOutput').style.opacity = '0.5';
            document.getElementById('apiBtn').disabled = true;
            document.getElementById('resultPanel').classList.add('hidden');
            document.getElementById('statusLabel').innerText = "ÖNİZLEME BEKLENİYOR";
            document.getElementById('statusLabel').className = "text-sm font-bold text-slate-500";
            document.getElementById('miniStatus').innerText = "";
        }

        function processQuestions() {
            const text = document.getElementById('inputText').value;
            const keyText = document.getElementById('answerKey').value;
            
            if(!text.trim()) {
                alert("Lütfen bir metin girin!");
                return;
            }

            const answers = {};
            if(keyText) {
                const pairs = keyText.split(/[,-\s]+/);
                for(let i=0; i<pairs.length; i+=2) {
                    if(pairs[i] && pairs[i+1]) {
                        const num = pairs[i].replace(/[^\d]/g, '');
                        if(num) answers[num] = pairs[i+1].toUpperCase();
                    }
                }
            }

            const questions = text.split(/\n(?=\d+[\.)\s])/).map((block, idx) => {
                const parts = block.split(/\n([A-E][\)\.])\s+/);
                const questionText = parts[0].replace(/^\d+[\.)\s]+/, '').trim();
                const options = [];
                for(let j=1; j<parts.length; j+=2) {
                    options.push({ key: parts[j][0], text: parts[j+1]?.trim() || "" });
                }

                const id = block.match(/^(\d+)/)?.[1] || (idx + 1);
                const correctKey = answers[id] || "A";
                const correct = options.find(o => o.key === correctKey) || options[0];
                const incorrects = options.filter(o => o.key !== correctKey).map(o => o.text);

                return {
                    category: "Genel",
                    type: "multiple",
                    difficulty: "medium",
                    question: questionText,
                    correct_answer: correct ? correct.text : "Hatalı Soru",
                    incorrect_answers: incorrects.length > 0 ? incorrects : ["Yanlış 1", "Yanlış 2", "Yanlış 3"]
                };
            }).filter(q => q.question.length > 3);

            quizData = { response_code: 0, results: questions };
            const output = document.getElementById('jsonOutput');
            output.textContent = JSON.stringify(quizData, null, 2);
            output.style.opacity = '1';
            
            document.getElementById('statusLabel').innerText = `${questions.length} SORU HAZIRLANDI`;
            document.getElementById('statusLabel').className = "text-sm font-bold text-green-500";
            document.getElementById('apiBtn').disabled = false;
            document.getElementById('miniStatus').innerText = "✅ AYRIŞTIRMA TAMAMLANDI";
        }

        async function generateLink() {
            if(!quizData) return;
            const btn = document.getElementById('apiBtn');
            const original = btn.innerHTML;
            btn.innerHTML = `<span class="loader"></span> OLUŞTURULUYOR...`;
            btn.disabled = true;

            try {
                // npoint.io servisi 404 hatası verdiği için daha stabil olan jsonblob servisine geçiş yapıldı
                const response = await fetch('https://jsonblob.com/api/jsonBlob', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(quizData)
                });

                if(response.ok) {
                    const blobUrl = response.headers.get('Location');
                    if (blobUrl) {
                        const finalUrl = blobUrl.replace('http://', 'https://');
                        document.getElementById('resultPanel').classList.remove('hidden');
                        document.getElementById('finalUrl').value = finalUrl;
                        btn.innerHTML = `LİNK HAZIR ✅`;
                        document.getElementById('miniStatus').innerText = "🚀 API LİNKİ AKTİF EDİLDİ";
                    } else {
                        throw new Error("API yanıtından konum bilgisi alınamadı.");
                    }
                } else {
                    throw new Error("Sunucu Hatası: " + response.status);
                }
            } catch (e) {
                console.error(e);
                alert("Hata: API servisi şu an yanıt vermiyor veya bağlantı sorunu var. Lütfen 'JSON Kopyala' butonunu kullanarak veriyi manuel olarak kullanın.");
                btn.innerHTML = `HATA ❌`;
                btn.disabled = false;
                setTimeout(() => { if(btn.innerHTML === 'HATA ❌') btn.innerHTML = original; }, 3000);
            }
        }

        function copyContent(id, isPre = false) {
            const el = document.getElementById(id);
            const text = isPre ? el.textContent : el.value;
            
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => alert("Başarıyla kopyalandı!"));
            } else {
                const t = document.createElement("textarea");
                t.value = text;
                document.body.appendChild(t);
                t.select();
                document.execCommand('copy');
                document.body.removeChild(t);
                alert("Kopyalandı!");
            }
        }

        function downloadJSON() {
            if(!quizData) return;
            const blob = new Blob([JSON.stringify(quizData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `kapisalim_data_${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
